name: Merge Nissan fluids

on:
  workflow_dispatch:
  push:
    paths:
      - 'Fluids/nissan_fluids_import.csv'
      - 'Fluids/tools/merge_nissan_fluids.py'
      - '.github/workflows/merge-nissan-fluids.yml'

permissions:
  contents: write

jobs:
  merge:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Merge Nissan records
        run: python Fluids/tools/merge_nissan_fluids.py
      - name: Validate Nissan import
        run: python Fluids/tools/validate_fluid_pack_part_numbers.py Fluids/nissan_fluids_import.csv
      - name: Report legacy master warnings without blocking merge
        continue-on-error: true
        run: python Fluids/tools/validate_fluid_pack_part_numbers.py Fluids/fluids_master.json
      - name: Commit merged database
        run: |
          if git diff --quiet -- Fluids/fluids_master.json; then
            echo 'No master database changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Fluids/fluids_master.json
          git commit -m 'Merge Australia-first Nissan fluids into master database'
          git push
