name: Update Ford TSB Index

on:
  push:
    paths:
      - "Ford/TSB/pdf/**/*.pdf"
      - "Ford/TSB/archive/superseded/**/*.pdf"
      - "Ford/TSB/data/manual-corrections.json"
      - "Ford/TSB/scripts/generate-tsb-index.py"
      - "Ford/TSB/index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ford-tsb-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install PDF text extraction tools
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf pypdf
      - name: Generate accurate Ford TSB index
        env:
          MOVE_SUPERSEDED: "true"
        run: python Ford/TSB/scripts/generate-tsb-index.py
      - name: Commit updated index and moved superseded PDFs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Ford/TSB/data/tsb-index.json Ford/TSB/pdf Ford/TSB/archive/superseded Ford/TSB/index.html Ford/TSB/scripts/generate-tsb-index.py Ford/TSB/data/manual-corrections.json
          git commit -m "Improve Ford TSB extraction and update index" || echo "No changes to commit"
          git push
