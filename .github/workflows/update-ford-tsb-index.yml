name: Update Ford TSB Index

on:
  push:
    paths:
      - "Ford/TSB/pdf/**/*.pdf"
      - "Ford/TSB/archive/superseded/**/*.pdf"
      - "Ford/TSB/scripts/generate-tsb-index.py"
      - "Ford/TSB/data/manual-overrides.json"
      - "Ford/TSB/index.html"
      - ".github/workflows/update-ford-tsb-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ford-tsb-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PDF parser
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf

      - name: Generate Ford TSB index
        run: |
          python Ford/TSB/scripts/generate-tsb-index.py

      - name: Commit updated TSB index and sorted files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Ford/TSB/data/tsb-index.json
          git add Ford/TSB/pdf
          git add Ford/TSB/archive/superseded
          git commit -m "Auto-update Ford TSB index" || echo "No changes to commit"
          git push
