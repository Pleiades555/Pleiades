name: Update Ford TSB Index

on:
  push:
    paths:
      - "Ford/TSB/pdf/**/*.pdf"
      - "Ford/TSB/archive/superseded/**/*.pdf"
      - "Ford/TSB/data/manual-overrides.json"
      - "Ford/TSB/scripts/generate-tsb-index.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-tsb-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PDF readers
        run: |
          python -m pip install --upgrade pip
          pip install pymupdf pypdf

      - name: Generate TSB index and sort superseded PDFs
        env:
          MOVE_SUPERSEDED: "true"
        run: |
          python Ford/TSB/scripts/generate-tsb-index.py

      - name: Commit updated TSB library
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Ford/TSB/data/tsb-index.json Ford/TSB/pdf Ford/TSB/archive/superseded
          git commit -m "Auto-update Ford TSB index" || echo "No changes to commit"
          git push
