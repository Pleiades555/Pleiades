name: Extract Honda oils PDF

on:
  workflow_dispatch:
  push:
    paths:
      - 'Honda/Fluids/Honda Oils.pdf'
      - '.github/workflows/extract-honda-oils.yml'

permissions:
  contents: write

jobs:
  extract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PDF tools
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Extract PDF text and metadata
        run: |
          pdfinfo 'Honda/Fluids/Honda Oils.pdf' > 'Honda/Fluids/Honda Oils metadata.txt'
          pdftotext -layout 'Honda/Fluids/Honda Oils.pdf' 'Honda/Fluids/Honda Oils extracted.txt'
      - name: Commit extracted text
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'Honda/Fluids/Honda Oils metadata.txt' 'Honda/Fluids/Honda Oils extracted.txt'
          if git diff --cached --quiet; then
            echo 'No extraction changes.'
            exit 0
          fi
          git commit -m 'Extract Honda oils PDF for fluids database'
          git push
