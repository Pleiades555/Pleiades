name: V4 validation
on:
  pull_request:
  push:
    paths:
      - 'v4/**'
      - '.github/workflows/v4.yml'
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.x'}
      - run: python3 v4/scripts/build_public.py
      - run: python3 v4/scripts/validate.py
      - run: python3 v4/scripts/test_regressions.py
      - run: python3 v4/scripts/check_links.py
