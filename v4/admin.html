<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pleiades V4 Admin</title><link rel="stylesheet" href="public/styles.css"></head><body><header><a class="logo" href="./">Pleiades V4</a></header><main><h1>Protected administration workflow</h1><p>This static preview does not store secrets or write directly from the browser. Use import preview below to validate JSON/CSV, then download a patch payload for review through GitHub.</p><textarea id="payload" rows="12" placeholder="Paste JSON import"></textarea><p><button onclick="validateImport()">Preview import</button><button onclick="downloadPatch()">Download patch payload</button></p><pre id="result"></pre><script>function validateImport(){try{const o=JSON.parse(payload.value||'{}');result.textContent=JSON.stringify({valid:true,records:Array.isArray(o)?o.length:Object.keys(o).length,mode:'dry-run; manual records preserved'},null,2)}catch(e){result.textContent='Invalid JSON: '+e.message}}function downloadPatch(){const blob=new Blob([payload.value],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pleiades-v4-import-preview.json';a.click()}</script></main></body></html>
