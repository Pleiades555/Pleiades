<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ford TSB Library</title>
  <style>
    :root { --bg:#0b1220; --panel:rgba(255,255,255,.08); --panel2:rgba(255,255,255,.12); --text:#f4f7fb; --muted:#b8c1d1; --accent:#6ec6ff; --warn:#ffb74d; --ok:#81c784; }
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(135deg,#07101f,#14213d);color:var(--text);min-height:100vh}
    header{padding:28px 20px;text-align:center;background:rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.12)}
    header h1{margin:0 0 8px;font-size:32px} header p{margin:0;color:var(--muted)}
    main{max-width:1250px;margin:0 auto;padding:24px}
    .toolbar{background:var(--panel);border:1px solid rgba(255,255,255,.14);border-radius:18px;padding:18px;margin-bottom:20px;backdrop-filter:blur(8px)}
    #search{width:100%;padding:16px 18px;font-size:17px;border:0;border-radius:12px;outline:none;margin-bottom:14px}
    .filters{display:flex;gap:10px;flex-wrap:wrap}.filters select,.filters button{padding:10px 12px;border:0;border-radius:10px;background:var(--panel2);color:var(--text)}
    .stats{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;color:var(--muted);font-size:14px}.stat{background:rgba(0,0,0,.2);padding:8px 10px;border-radius:999px}
    .card{background:var(--panel);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 6px 20px rgba(0,0,0,.15)}
    .card.superseded{border-left:6px solid var(--warn)}.top{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}.title{font-size:20px;font-weight:700;margin:0 0 6px}.meta{color:var(--muted);font-size:14px;line-height:1.5}.badge{display:inline-block;padding:4px 9px;border-radius:999px;font-size:12px;margin-right:6px;background:rgba(255,255,255,.15)}.badge.warn{background:var(--warn);color:#1b1000}.badge.ok{background:var(--ok);color:#06140a}
    .section{margin-top:12px}.label{font-weight:700;color:#dbe9ff;margin-bottom:4px}.text{color:#eef3fb;line-height:1.45}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}.chip{font-size:12px;padding:4px 8px;border-radius:999px;background:rgba(110,198,255,.16);border:1px solid rgba(110,198,255,.25)}
    ul.compact{margin:6px 0 0 20px;padding:0} ul.compact li{margin:4px 0;color:#eef3fb}.actions{margin-top:14px;display:flex;gap:10px;flex-wrap:wrap}.actions a{color:#061424;background:var(--accent);padding:9px 12px;border-radius:10px;text-decoration:none;font-weight:700}.actions a.secondary{background:rgba(255,255,255,.14);color:var(--text)}
    .empty{padding:30px;text-align:center;color:var(--muted)}
  </style>
</head>
<body>
<header><h1>Ford TSB / FSA / SSM Library</h1><p>Search by model, year, TSB/FSA/SSM number, symptom, concern, part number or conditional ordering logic.</p></header>
<main>
  <div class="toolbar">
    <input id="search" type="search" placeholder="Search Ranger, 26-2159, 23P23, battery drain, part number, if damaged order..." />
    <div class="filters">
      <select id="typeFilter"><option value="">All types</option><option>TSB</option><option>FSA</option><option>SSM</option><option>Recall</option></select>
      <select id="statusFilter"><option value="">All statuses</option><option>Current</option><option>Superseded</option></select>
      <button id="clearBtn">Clear</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
  <div id="results" class="results"><div class="empty">Loading Ford TSB index...</div></div>
</main>
<script>
let records=[];
const $=id=>document.getElementById(id);
function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function pdfHref(path){return encodeURI('../../' + path).replace(/#/g,'%23');}
function arr(v){return Array.isArray(v)?v:(v?[v]:[])}
async function load(){
  try{
    const res=await fetch('data/tsb-index.json?v='+Date.now(),{cache:'no-store'});
    records=await res.json();
    render();
  }catch(e){$('results').innerHTML='<div class="empty">Could not load data/tsb-index.json. Run the GitHub Action to generate the index.</div>';}
}
function filtered(){
  const q=$('search').value.trim().toLowerCase(); const t=$('typeFilter').value; const s=$('statusFilter').value;
  return records.filter(r=>{
    if(t && r.type!==t) return false; if(s && r.status!==s) return false;
    if(!q) return true;
    const hay=(r.searchText || [r.number,r.type,r.title,r.model,r.yearRange,r.symptom,r.concern,r.filename,...arr(r.partNumbers),...arr(r.partsTable),...arr(r.conditionalLogic)].join(' ')).toLowerCase();
    return hay.includes(q);
  });
}
function stats(list){
  const total=records.length, shown=list.length, current=records.filter(r=>r.status==='Current').length, sup=records.filter(r=>r.status==='Superseded').length;
  $('stats').innerHTML=`<span class="stat">${shown} shown</span><span class="stat">${total} total</span><span class="stat">${current} current</span><span class="stat">${sup} superseded</span>`;
}
function render(){
  const list=filtered(); stats(list);
  if(!list.length){$('results').innerHTML='<div class="empty">No matching bulletins found.</div>';return;}
  $('results').innerHTML=list.map(r=>card(r)).join('');
}
function card(r){
  const parts=arr(r.partNumbers), table=arr(r.partsTable), logic=arr(r.conditionalLogic);
  const supersedes=arr(r.supersedes), supBy=arr(r.supersededBy);
  return `<article class="card ${r.status==='Superseded'?'superseded':''}">
    <div class="top"><div><div class="title">${esc(r.number||r.tsbNumber||'Unknown number')} — ${esc(r.title||r.filename||'Untitled')}</div>
    <div class="meta"><span class="badge">${esc(r.type||'TSB')}</span><span class="badge ${r.status==='Superseded'?'warn':'ok'}">${esc(r.status||'Current')}</span>
    <strong>Model:</strong> ${esc(r.model||'Unknown')} &nbsp; <strong>Years:</strong> ${esc(r.yearRange||'Unknown')}</div></div></div>
    <div class="section"><div class="label">Symptom / Concern</div><div class="text">${esc(r.symptom||r.concern||r.description||'Not extracted')}</div></div>
    ${parts.length?`<div class="section"><div class="label">Parts / Part Numbers Found</div><div class="chips">${parts.map(p=>`<span class="chip">${esc(p)}</span>`).join('')}</div></div>`:''}
    ${table.length?`<div class="section"><div class="label">Parts Table / Parts Section Extract</div><ul class="compact">${table.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`:''}
    ${logic.length?`<div class="section"><div class="label">If-Clause / Conditional Ordering Logic</div><ul class="compact">${logic.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`:''}
    ${supersedes.length||supBy.length?`<div class="section"><div class="label">Supersession</div><div class="text">${supersedes.length?`Supersedes: ${esc(supersedes.join(', '))}. `:''}${supBy.length?`Superseded by: ${esc(Array.isArray(supBy)?supBy.join(', '):supBy)}.`:''}</div></div>`:''}
    <div class="actions"><a href="${pdfHref(r.file)}" target="_blank" rel="noopener">Open PDF</a><a class="secondary" href="${pdfHref(r.file)}" download>Download</a></div>
  </article>`;
}
['search','typeFilter','statusFilter'].forEach(id=>$(id).addEventListener('input',render));
$('clearBtn').addEventListener('click',()=>{$('search').value='';$('typeFilter').value='';$('statusFilter').value='';render();});
load();
</script>
</body>
</html>
