<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ford TSB Library</title>
  <style>
    :root{--bg:#07111f;--panel:rgba(9,20,36,.88);--panel2:rgba(255,255,255,.07);--line:rgba(255,255,255,.18);--text:#f5f7fb;--muted:#aeb9c8;--accent:#53b7ff;--warn:#ffb02e;--good:#54d18b;--bad:#ff6262}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#07111f;color:var(--text);min-height:100vh} body:before{content:"";position:fixed;inset:0;background:radial-gradient(circle at top left,rgba(34,117,205,.35),transparent 36%),linear-gradient(145deg,#07111f,#101923 55%,#02060b);z-index:-1}
    header{padding:28px 20px;border-bottom:1px solid var(--line);background:rgba(0,0,0,.28)} .wrap{max-width:1280px;margin:0 auto} h1{margin:0;font-size:34px;letter-spacing:.3px} .sub{margin:8px 0 0;color:var(--muted)}
    .toolbar{margin:24px 0;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 20px 40px rgba(0,0,0,.25)}
    .search{display:flex;gap:12px;flex-wrap:wrap}.search input{flex:1;min-width:280px;padding:15px 16px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);font-size:16px;outline:none}.search input::placeholder{color:#91a0b2}.filters{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.filters button{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:9px 12px;border-radius:999px;cursor:pointer}.filters button.active{background:var(--accent);color:#00131f;border-color:transparent;font-weight:bold}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(140px,1fr));gap:12px;margin:18px 0}.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px}.stat strong{display:block;font-size:24px}.stat span{color:var(--muted);font-size:13px}
    .result-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:18px 0;color:var(--muted)} select{background:var(--panel);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:18px;margin:12px 0}.card.superseded{border-left:7px solid var(--warn)}.card.current{border-left:7px solid var(--good)}.top{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}.title{font-size:20px;font-weight:bold}.meta{color:var(--muted);margin-top:8px;line-height:1.55}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tag{background:rgba(255,255,255,.1);border:1px solid var(--line);border-radius:999px;padding:5px 9px;font-size:12px}.tag.warn{background:rgba(255,176,46,.18);border-color:rgba(255,176,46,.45);color:#ffd38b}.tag.good{background:rgba(84,209,139,.16);border-color:rgba(84,209,139,.4);color:#b9f4d0}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}.actions a{color:#00131f;background:var(--accent);padding:9px 12px;border-radius:10px;text-decoration:none;font-weight:bold}.actions a.secondary{background:rgba(255,255,255,.1);color:var(--text);border:1px solid var(--line)}
    .note{padding:12px 14px;border-radius:12px;background:rgba(255,176,46,.14);border:1px solid rgba(255,176,46,.38);margin-top:12px;color:#ffdda3}.empty{padding:32px;text-align:center;color:var(--muted);background:var(--panel);border:1px dashed var(--line);border-radius:18px}
    @media(max-width:760px){.stats{grid-template-columns:repeat(2,1fr)} h1{font-size:27px}}
  </style>
</head>
<body>
  <header><div class="wrap"><h1>Ford Technical Service Bulletins</h1><p class="sub">Search by model, year, TSB number, bulletin number, recall/SSM number, symptom, engine or PDF text.</p></div></header>
  <main class="wrap">
    <section class="toolbar">
      <div class="search"><input id="q" type="search" placeholder="Example: Ranger PX3 battery drain, 26-2159, vibration, P5AT, superseded..." autofocus /></div>
      <div class="filters">
        <button class="active" data-filter="all">All</button><button data-filter="current">Current</button><button data-filter="superseded">Superseded</button><button data-filter="hasSupersession">Has supersession link</button><button data-filter="needsReview">Needs review</button>
      </div>
    </section>
    <section class="stats"><div class="stat"><strong id="countAll">0</strong><span>Total bulletins</span></div><div class="stat"><strong id="countCurrent">0</strong><span>Current</span></div><div class="stat"><strong id="countSuperseded">0</strong><span>Superseded</span></div><div class="stat"><strong id="countReview">0</strong><span>Needs review</span></div></section>
    <div class="result-head"><div id="resultCount">Loading...</div><label>Sort <select id="sort"><option value="newest">Newest / highest number</option><option value="tsb">TSB number</option><option value="model">Model</option><option value="status">Status</option></select></label></div>
    <section id="results"></section>
  </main>
<script>
let DATA=[]; let filter='all';
const $=id=>document.getElementById(id);
function textOf(x){return Array.isArray(x)?x.join(' '):(x||'')}
async function load(){try{const r=await fetch('data/tsb-index.json?v='+Date.now()); DATA=await r.json(); updateStats(); render();}catch(e){$('results').innerHTML='<div class="empty">Could not load data/tsb-index.json. Run the GitHub Action or scripts/generate-tsb-index.py first.</div>'; $('resultCount').textContent='Index not found';}}
function updateStats(){ $('countAll').textContent=DATA.length; $('countCurrent').textContent=DATA.filter(x=>x.status==='Current').length; $('countSuperseded').textContent=DATA.filter(x=>x.status==='Superseded').length; $('countReview').textContent=DATA.filter(x=>x.needsReview).length; }
function matches(item,q){ if(!q) return true; const hay=[item.tsbNumber,item.bulletinNumber,item.documentType,item.title,item.model,item.years,item.engine,item.symptom,item.status,item.supersedes,item.supersededBy,item.file,item.textPreview,item.searchText].map(textOf).join(' ').toLowerCase(); return q.toLowerCase().split(/\s+/).every(p=>hay.includes(p)); }
function passFilter(x){ if(filter==='all') return true; if(filter==='current') return x.status==='Current'; if(filter==='superseded') return x.status==='Superseded'; if(filter==='hasSupersession') return !!(x.supersedes||x.supersededBy); if(filter==='needsReview') return !!x.needsReview; return true; }
function sortData(a,b){ const s=$('sort').value; if(s==='model') return textOf(a.model).localeCompare(textOf(b.model)); if(s==='status') return textOf(a.status).localeCompare(textOf(b.status)); if(s==='tsb') return textOf(a.tsbNumber).localeCompare(textOf(b.tsbNumber)); return textOf(b.tsbNumber).localeCompare(textOf(a.tsbNumber)); }
function esc(s){return String(s||'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){ const q=$('q').value.trim(); let rows=DATA.filter(x=>matches(x,q)&&passFilter(x)).sort(sortData); $('resultCount').textContent=`${rows.length} result${rows.length===1?'':'s'}`; if(!rows.length){$('results').innerHTML='<div class="empty">No matching TSBs found.</div>';return}
$('results').innerHTML=rows.map(x=>{ const cls=x.status==='Superseded'?'superseded':'current'; const statusTag=x.status==='Superseded'?'<span class="tag warn">Superseded</span>':'<span class="tag good">Current</span>'; const supBy=x.supersededBy?`<div class="note">Superseded by: <strong>${esc(textOf(x.supersededBy))}</strong></div>`:''; const sups=x.supersedes?`<div class="note">Supersedes: <strong>${esc(textOf(x.supersedes))}</strong></div>`:''; return `<article class="card ${cls}"><div class="top"><div><div class="title">${esc(x.tsbNumber||x.bulletinNumber||x.title||'Unknown bulletin')}</div><div class="meta"><strong>Title:</strong> ${esc(x.title||'Not detected')}<br><strong>Model:</strong> ${esc(textOf(x.model)||'Unknown')} &nbsp; <strong>Years:</strong> ${esc(textOf(x.years)||'Unknown')}<br><strong>Symptom:</strong> ${esc(textOf(x.symptom)||'Not detected')}</div></div><div>${statusTag}${x.needsReview?'<span class="tag warn">Needs review</span>':''}</div></div><div class="tags"><span class="tag">${esc(x.documentType||'Bulletin')}</span>${x.engine?`<span class="tag">Engine: ${esc(textOf(x.engine))}</span>`:''}${x.sourceQuality?`<span class="tag">${esc(x.sourceQuality)}</span>`:''}</div>${supBy}${sups}<div class="actions"><a href="${esc(x.file)}" target="_blank">Open PDF</a>${x.archivedFrom?`<a class="secondary" href="${esc(x.archivedFrom)}" target="_blank">Original path</a>`:''}</div></article>`}).join(''); }
document.querySelectorAll('[data-filter]').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('[data-filter]').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;render()})); $('q').addEventListener('input',render); $('sort').addEventListener('change',render); load();
</script>
</body>
</html>
